<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Banner Manutenção X - 1024x500</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      flex-direction: column;
      gap: 20px;
    }
    .banner-container {
      width: 1024px;
      height: 500px;
      border: 1px solid #333;
    }
    .banner-container img {
      width: 100%;
      height: 100%;
    }
    .info {
      color: #888;
      font-family: Inter, sans-serif;
      font-size: 14px;
    }
    .info strong { color: #f57c00; }
  </style>
</head>
<body>
  <div class="banner-container">
    <img src="banner-1024x500.svg" alt="Banner Manutenção X"/>
  </div>
  <p class="info">Banner <strong>1024 × 500</strong> — Clique com botão direito na imagem → "Salvar imagem como..." para exportar</p>
</body>
</html>
