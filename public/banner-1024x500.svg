<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f57c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="80" r="200" fill="#f57c00" opacity="0.06"/>
  <circle cx="120" cy="420" r="160" fill="#f57c00" opacity="0.05"/>
  <circle cx="750" cy="400" r="120" fill="#ffb74d" opacity="0.04"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1024" y2="100"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="300" x2="1024" y2="300"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- Left content area -->
  <!-- App name -->
  <text x="80" y="155" font-family="Inter, Segoe UI, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Manutenção
    <tspan fill="url(#accent)"> X</tspan>
  </text>

  <!-- Accent line -->
  <rect x="80" y="175" width="90" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="215" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="0.5">
    Sistema de Manutenção Predial
  </text>

  <!-- Description -->
  <text x="80" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#64748b" letter-spacing="0.2">
    <tspan x="80" y="265">Gestão inteligente de ordens de serviço, checklists,</tspan>
    <tspan x="80" y="288">escalas, vistorias, estoque e muito mais.</tspan>
  </text>

  <!-- Stats row -->
  <g transform="translate(80, 320)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="#f57c00">37+</text>
    <text x="0" y="22" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-transform="uppercase" letter-spacing="1">MÓDULOS</text>

    <!-- Divider -->
    <line x1="95" y1="-10" x2="95" y2="28" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="120" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="#f57c00">4</text>
    <text x="120" y="22" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="1">PERFIS</text>

    <!-- Divider -->
    <line x1="195" y1="-10" x2="195" y2="28" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="220" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="#f57c00">100%</text>
    <text x="220" y="22" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="1">RESPONSIVO</text>
  </g>

  <!-- Badge -->
  <g transform="translate(80, 400)">
    <rect width="310" height="40" rx="20" fill="url(#accent)" opacity="0.15"/>
    <text x="155" y="26" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#f57c00" text-anchor="middle" letter-spacing="0.5">
      ★  Sistema Completo para Condomínios
    </text>
  </g>

  <!-- Right side: Feature cards mockup -->
  <g transform="translate(580, 50)" filter="url(#shadow)">
    <!-- Card 1: OS -->
    <rect x="0" y="0" width="180" height="100" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Wrench icon -->
    <g transform="translate(20, 22)" fill="none" stroke="#f57c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </g>
    <text x="20" y="68" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Ordens de Serviço</text>
    <text x="20" y="85" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#94a3b8">Gestão completa de OS</text>

    <!-- Card 2: Checklists -->
    <rect x="200" y="0" width="180" height="100" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Checklist icon -->
    <g transform="translate(220, 22)" fill="none" stroke="#ffb74d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </g>
    <text x="220" y="68" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Checklists</text>
    <text x="220" y="85" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#94a3b8">Verificações diárias</text>

    <!-- Card 3: Escalas -->
    <rect x="0" y="120" width="180" height="100" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Calendar icon -->
    <g transform="translate(20, 142)" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </g>
    <text x="20" y="188" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Escalas</text>
    <text x="20" y="205" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#94a3b8">Turnos e equipes</text>

    <!-- Card 4: Vistorias -->
    <rect x="200" y="120" width="180" height="100" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Search/inspect icon -->
    <g transform="translate(220, 142)" fill="none" stroke="#81c784" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </g>
    <text x="220" y="188" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Vistorias</text>
    <text x="220" y="205" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#94a3b8">Inspeções detalhadas</text>

    <!-- Card 5: Estoque -->
    <rect x="0" y="240" width="180" height="100" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Box icon -->
    <g transform="translate(20, 262)" fill="none" stroke="#ce93d8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </g>
    <text x="20" y="308" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Materiais</text>
    <text x="20" y="325" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#94a3b8">Controle de estoque</text>

    <!-- Card 6: QR Code -->
    <rect x="200" y="240" width="180" height="100" rx="12" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- QR icon -->
    <g transform="translate(220, 262)" fill="none" stroke="#ffcc80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="8" height="8" rx="1"/>
      <rect x="14" y="2" width="8" height="8" rx="1"/>
      <rect x="2" y="14" width="8" height="8" rx="1"/>
      <rect x="14" y="14" width="4" height="4" rx="0.5"/>
      <line x1="22" y1="14" x2="22" y2="22"/>
      <line x1="14" y1="22" x2="22" y2="22"/>
    </g>
    <text x="220" y="308" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#ffffff">QR Codes</text>
    <text x="220" y="325" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#94a3b8">Identificação rápida</text>
  </g>

  <!-- Bottom gradient fade -->
  <rect x="0" y="460" width="1024" height="40" fill="url(#bg)" opacity="0.5"/>

  <!-- Domain at bottom -->
  <text x="512" y="485" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="1">
    manutencaox.com.br
  </text>
</svg>
