name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_PATH: /opt/manutencao-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest on server
        run: |
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && git fetch origin main && git reset --hard origin/main"

      - name: Build and restart
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && docker compose build --no-cache --pull manutencao-app manutencao-api && docker compose up -d --force-recreate --remove-orphans"

      - name: Remove containers conflitantes (Coolify legado + /opt/manutencaox lixo)
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' <<"REMOTE"
          set -e
          # Coolify legado (nao usado mais)
          for c in $(docker ps -a --format '{{.Names}}' | grep -E '^vc84okoc0gkcg08wkskksg4o' || true); do
            echo "Removendo Coolify: $c"
            docker rm -f "$c" || true
          done
          # Stack manutencaox-* (lixo conforme CLAUDE.md)
          if [ -d /opt/manutencaox ]; then
            cd /opt/manutencaox && docker compose down -v --remove-orphans || true
          fi
          for c in manutencaox-app manutencaox-api manutencaox-backup manutencaox-db; do
            docker rm -f "$c" 2>/dev/null || true
          done
          echo "=== Containers restantes com rule manutencaox.com.br ==="
          for c in $(docker ps --format '{{.Names}}'); do
            labels=$(docker inspect "$c" --format '{{json .Config.Labels}}' 2>/dev/null)
            if echo "$labels" | grep -q manutencaox.com.br; then echo "--> $c"; fi
          done
          REMOTE

      - name: Patch DB - colunas e tabelas faltantes
        run: |
          SQL="ALTER TABLE ordens_servico ADD COLUMN IF NOT EXISTS criado_em TIMESTAMPTZ DEFAULT NOW();
          UPDATE ordens_servico SET criado_em = COALESCE(criado_em, data_abertura, NOW()) WHERE criado_em IS NULL;
          DROP TABLE IF EXISTS push_subscriptions CASCADE;
          CREATE TABLE IF NOT EXISTS push_subscriptions (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), user_id UUID NOT NULL REFERENCES usuarios(id) ON DELETE CASCADE, endpoint TEXT NOT NULL, subscription JSONB NOT NULL, criado_em TIMESTAMPTZ NOT NULL DEFAULT NOW(), atualizado_em TIMESTAMPTZ NOT NULL DEFAULT NOW(), UNIQUE(user_id, endpoint));
          CREATE INDEX IF NOT EXISTS idx_push_sub_user ON push_subscriptions(user_id);
          CREATE TABLE IF NOT EXISTS fornecedores_contratos (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), fornecedor_id UUID NOT NULL REFERENCES fornecedores(id) ON DELETE CASCADE, condominio_id UUID NOT NULL REFERENCES condominios(id) ON DELETE CASCADE, numero_contrato VARCHAR(100), descricao TEXT, valor DECIMAL(12,2), data_inicio DATE, data_fim DATE, renovacao_automatica BOOLEAN DEFAULT false, alerta_dias_antes INT DEFAULT 30, status VARCHAR(20) DEFAULT 'vigente', documento_url TEXT, observacoes TEXT, criado_por UUID NOT NULL REFERENCES usuarios(id) ON DELETE RESTRICT, criado_em TIMESTAMPTZ NOT NULL DEFAULT NOW(), atualizado_em TIMESTAMPTZ NOT NULL DEFAULT NOW());
          CREATE INDEX IF NOT EXISTS idx_contratos_fornecedor ON fornecedores_contratos(fornecedor_id);
          CREATE INDEX IF NOT EXISTS idx_contratos_condominio ON fornecedores_contratos(condominio_id);
          CREATE INDEX IF NOT EXISTS idx_contratos_data_fim ON fornecedores_contratos(data_fim);
          CREATE INDEX IF NOT EXISTS idx_contratos_status ON fornecedores_contratos(status);
          ALTER TABLE notificacoes ADD COLUMN IF NOT EXISTS criado_em TIMESTAMPTZ DEFAULT NOW();
          ALTER TABLE login_attempts ADD COLUMN IF NOT EXISTS criado_em TIMESTAMPTZ DEFAULT NOW();
          ALTER TABLE audit_logs ADD COLUMN IF NOT EXISTS criado_em TIMESTAMPTZ DEFAULT NOW();
          ALTER TABLE metricas_uso ADD COLUMN IF NOT EXISTS data DATE DEFAULT CURRENT_DATE;
          CREATE TABLE IF NOT EXISTS refresh_tokens (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), user_id UUID NOT NULL REFERENCES usuarios(id) ON DELETE CASCADE, token_hash VARCHAR(128) NOT NULL UNIQUE, expires_at TIMESTAMPTZ NOT NULL, revogado BOOLEAN NOT NULL DEFAULT false, user_agent VARCHAR(500), ip VARCHAR(45), criado_em TIMESTAMPTZ NOT NULL DEFAULT NOW(), usado_em TIMESTAMPTZ);
          CREATE INDEX IF NOT EXISTS idx_refresh_user ON refresh_tokens(user_id);
          CREATE INDEX IF NOT EXISTS idx_refresh_hash ON refresh_tokens(token_hash) WHERE revogado = false;"
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "docker exec -i manutencao-db psql -U manutencao -d manutencao" <<< "$SQL"

      - name: Health check
        run: |
          sleep 10
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker ps --filter name=manutencao --format '{{.Names}}: {{.Status}}'"
