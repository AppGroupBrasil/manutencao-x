name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_PATH: /opt/manutencao-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest on server
        run: |
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && git fetch origin main && git reset --hard origin/main"

      - name: Build and restart
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && docker compose build --no-cache --pull manutencao-app manutencao-api && docker compose up -d --force-recreate --remove-orphans"

      - name: Deep diagnose suspects
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' <<"REMOTE"
          for c in manutencao-app manutencaox-app manutencao-staging-app app-manutencao vc84okoc0gkcg08wkskksg4o-101346839319; do
            echo "=== $c ==="
            docker inspect "$c" --format 'Image: {{.Config.Image}} | Created: {{.Created}} | Project: {{index .Config.Labels "com.docker.compose.project"}} | Workdir: {{index .Config.Labels "com.docker.compose.project.working_dir"}}' 2>/dev/null || echo 'nao existe'
            docker inspect "$c" --format '{{range $k,$v := .Config.Labels}}{{if eq $k "traefik.http.routers.manutencao-https.rule"}}TraefikRule: {{$v}}{{end}}{{end}}' 2>/dev/null
            echo
          done
          REMOTE

      - name: Diagnose conflicting containers
        run: |
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo '=== Todos os containers manutencao* ===' ; docker ps -a --format '{{.Names}} | {{.Status}} | {{.Image}}' | grep -i manuten || true ; echo ; echo '=== Quem tem rule de manutencaox.com.br no Traefik ===' ; for c in \$(docker ps --format '{{.Names}}'); do labels=\$(docker inspect \$c --format '{{json .Config.Labels}}' 2>/dev/null); if echo \"\$labels\" | grep -q manutencaox.com.br; then echo \"--> \$c\"; fi; done"

      - name: Health check
        run: |
          sleep 10
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker ps --filter name=manutencao --format '{{.Names}}: {{.Status}}'"
